<!-- template inheritance -->
 {% extends 'base.html' %}
    {% block body %}
        <div class="container-fluid">
      <div class="mb-3">
        <h2>Update Todo</h2>
        <form action="/update/{{ todo.sno }}" method="POST">
   <label for="exampleFormControlInput1"  class="form-label" >Todo Title</label>
  <input type="text" class="form-control"  name="title" id="exampleFormControlInput1" value="{{todo.title}}" placeholder="todo title"/>
   </div>
    <div class="mb-3">
  <label for="exampleFormControlTextarea1" class="form-label">Todo Description</label>
  <textarea class="form-control"  value="{{todo.desc}}" name="desc" id="exampleFormControlTextarea1" rows="3" placeholder="todo desc">{{todo.desc}}</textarea>

  <button type="submit" class="btn btn-outline-primary mt-3 ">update</button>
  </form>
</div>
    </div>


    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    -->
   
  
    {% endblock body %}
